<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FringeShop | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #36393f; color: #dcddde; }
        .sidebar { background-color: #2f3136; }
        .card { background-color: #2f3136; border: 1px solid #4f545c; }
        .btn-primary { background-color: #5865f2; transition: 0.3s; }
        .btn-primary:hover { background-color: #4752c4; }
        .status-online { color: #3ba55c; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <div class="sidebar w-64 flex-shrink-0 flex flex-col border-r border-black/20">
        <div class="p-6 text-xl font-bold text-white border-b border-black/10 flex items-center gap-2">
            🧪 FringeShop <span class="text-xs bg-indigo-500 px-1 rounded">PRO</span>
        </div>
        
        <div class="p-4 flex flex-col gap-4 flex-grow">
            <div class="flex items-center gap-3 p-2 rounded hover:bg-white/5 cursor-pointer">
                <img src="{{.Avatar}}" class="w-10 h-10 rounded-full border-2 border-indigo-500">
                <div>
                    <p class="text-sm font-bold text-white">{{.Username}}</p>
                    <p class="text-xs text-gray-400">Verificado ✅</p>
                </div>
            </div>
            
            <nav class="mt-4 flex flex-col gap-2">
                <a href="#" class="p-2 bg-indigo-500/10 text-indigo-400 rounded">📊 Dashboard</a>
                <a href="#" class="p-2 hover:bg-white/5 rounded">🛡️ Proxy Manager</a>
                <a href="#" class="p-2 hover:bg-white/5 rounded">⚙️ Ajustes</a>
            </nav>
        </div>
        
        <div class="p-4 text-xs text-gray-500 border-t border-black/10">
            Koyeb Engine v1.0 | 24/7 Active
        </div>
    </div>

    <main class="flex-grow p-8 overflow-y-auto">
        <div class="max-w-4xl mx-auto">
            <h1 class="text-2xl font-bold text-white mb-6">Panel de Control de Selfbots</h1>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                <div class="card p-6 rounded-lg shadow-xl">
                    <h3 class="font-bold mb-4 flex items-center gap-2 text-white">
                        🎟️ Tokens (36 detectados)
                    </h3>
                    <textarea id="tokens" rows="6" class="w-full bg-[#202225] border-none rounded p-3 text-sm focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="Pega tus tokens aquí..."></textarea>
                </div>

                <div class="card p-6 rounded-lg shadow-xl">
                    <h3 class="font-bold mb-4 flex items-center gap-2 text-white">
                        🌐 Proxies (HTTP/SOCKS5)
                    </h3>
                    <textarea id="proxies" rows="6" class="w-full bg-[#202225] border-none rounded p-3 text-sm focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="IP:PORT:USER:PASS"></textarea>
                </div>
            </div>

            <div class="card p-6 rounded-lg shadow-xl mb-8">
                <h3 class="font-bold mb-4 text-white">⚡ Acciones Globales</h3>
                <div class="flex flex-wrap gap-4">
                    <input type="text" id="actionValue" class="flex-grow bg-[#202225] rounded p-2 outline-none border border-transparent focus:border-indigo-500" placeholder="Nueva BIO o Nombre...">
                    <button onclick="sendAction('bio')" class="btn-primary text-white px-6 py-2 rounded font-bold">Cambiar BIO</button>
                    <button onclick="sendAction('check')" class="bg-gray-600 hover:bg-gray-700 text-white px-6 py-2 rounded font-bold">Checkear Status</button>
                </div>
            </div>

            <div class="bg-black rounded-lg p-4 font-mono text-xs h-48 overflow-y-auto border border-white/10 shadow-inner" id="console">
                <p class="text-green-400">[SYSTEM] Esperando órdenes...</p>
            </div>
        </div>
    </main>

    <script>
        function log(msg, color = "text-gray-400") {
            const consoleBox = document.getElementById('console');
            const p = document.createElement('p');
            p.className = color;
            p.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
            consoleBox.appendChild(p);
            consoleBox.scrollTop = consoleBox.scrollHeight;
        }

        async function sendAction(type) {
            const tokens = document.getElementById('tokens').value.split('\n').filter(t => t.trim() !== "");
            const value = document.getElementById('actionValue').value;
            
            log(`Iniciando acción: ${type} en ${tokens.length} tokens...`, "text-indigo-400");
            
            // Aquí llamarías al endpoint de tu servidor Go
            const resp = await fetch('/api/action', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: type, tokens: tokens, value: value })
            });
            
            const result = await resp.text();
            log(result, "text-green-400");
        }
    </script>
</body>
</html>
